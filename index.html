<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>虛擬資產服務法草案｜Excel 下載</title>
  <style>
    :root{--navy:#10263f;--blue:#225b91;--pale:#eef4f8;--line:#d8e1e8;--text:#17212b;--muted:#64717d;--white:#fff}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:28px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;color:var(--text);background:radial-gradient(circle at 15% 10%,rgba(34,91,145,.10),transparent 26%),linear-gradient(145deg,#f7fafc 0%,#eef3f7 100%)}
    .card{width:min(720px,100%);background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:22px;box-shadow:0 24px 65px rgba(16,38,63,.14);overflow:hidden}.topline{height:7px;background:linear-gradient(90deg,var(--navy),var(--blue))}.content{padding:48px 46px 42px}.eyebrow{display:inline-flex;padding:7px 11px;border-radius:999px;background:var(--pale);color:var(--blue);font-size:13px;font-weight:700;letter-spacing:.04em}h1{margin:22px 0 14px;font-size:clamp(30px,5vw,46px);line-height:1.15;letter-spacing:-.025em;color:var(--navy)}.desc{margin:0;color:var(--muted);font-size:17px;line-height:1.75}.file-box{margin:30px 0 26px;padding:19px 20px;display:flex;align-items:center;gap:15px;border:1px solid var(--line);border-radius:15px;background:#fbfcfd}.icon{width:48px;height:48px;display:grid;place-items:center;border-radius:12px;color:#fff;background:#217346;font-weight:800;font-size:15px}.file-name{font-size:15px;font-weight:750;overflow-wrap:anywhere}.meta{margin-top:5px;color:var(--muted);font-size:13px}.download{width:100%;border:0;border-radius:13px;padding:16px 22px;cursor:pointer;color:#fff;background:linear-gradient(100deg,var(--navy),var(--blue));font-size:17px;font-weight:800;box-shadow:0 10px 22px rgba(34,91,145,.22)}.download:disabled{opacity:.6;cursor:wait}.status{min-height:24px;margin-top:14px;text-align:center;color:#217346;font-size:14px;font-weight:650}.foot{padding:17px 24px;text-align:center;border-top:1px solid var(--line);background:#fafcfd;color:var(--muted);font-size:12px}@media(max-width:560px){body{padding:16px}.content{padding:36px 25px 30px}.file-box{align-items:flex-start}}
  </style>
</head>
<body>
  <main class="card">
    <div class="topline"></div>
    <section class="content">
      <div class="eyebrow">法律文件整理</div>
      <h1>虛擬資產服務法草案</h1>
      <p class="desc">已將草案法條整理為可搜尋、篩選與後續分析的 Excel。點擊下方按鈕即可直接下載。</p>
      <div class="file-box"><div class="icon">XLSX</div><div><div class="file-name">虛擬資產服務法草案_法條整理.xlsx</div><div class="meta">Microsoft Excel · 37.8 KB</div></div></div>
      <button id="downloadBtn" class="download" type="button">一鍵下載 Excel</button>
      <div id="status" class="status" aria-live="polite"></div>
    </section>
    <footer class="foot">公開下載頁面，由 GitHub Pages 提供。</footer>
  </main>
  <script>
    const btn=document.getElementById('downloadBtn');const status=document.getElementById('status');
    btn.addEventListener('click',async()=>{btn.disabled=true;status.textContent='正在準備檔案…';try{const parts=await Promise.all(Array.from({length:7},(_,i)=>fetch(`chunks/chunk-${i}.txt`).then(r=>{if(!r.ok)throw new Error('chunk');return r.text()})));const binary=atob(parts.join(''));const bytes=new Uint8Array(binary.length);for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);const blob=new Blob([bytes],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='虛擬資產服務法草案_法條整理.xlsx';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);status.textContent='下載已開始';}catch(e){console.error(e);status.textContent='下載失敗，請重新整理後再試';}finally{btn.disabled=false;}});
  </script>
</body>
</html>
